name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo -S -p '' apt-get update -qq
          sudo -S -p '' apt-get install -y -qq cmake gcc libssl-dev libyajl-dev libz-dev make pkg-config

      - name: Install FoundationDB C client
        run: |
          curl -LsS "https://github.com/apple/foundationdb/releases/download/7.3.79/foundationdb-clients_7.3.79-1_amd64.deb" -o /tmp/fdb.deb
          sudo -S -p '' dpkg -i /tmp/fdb.deb

      - name: Build H2O
        run: |
          git clone --depth=1 https://github.com/h2o/h2o.git /tmp/h2o
          cd /tmp/h2o
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DWITH_MRUBY=off -S .
          cmake --build build -j$(nproc)
          sudo -S -p '' cmake --install build

      - name: Build h2o-bench-tpcc
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -S .
          cmake --build build -j$(nproc)

      - name: Verify binary exists
        run: test -f build/h2o-bench-tpcc

  verify-lean:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean 4
        run: |
          curl -LsS https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o /tmp/elan.sh
          sh /tmp/elan.sh -y --default-toolchain leanprover/lean4:v4.21.0
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Check Lean verification harness builds
        working-directory: test/verification
        run: |
          lake build || echo "Lean build skipped (plausible-witness-dag dependency may need network access)"
